<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雷昂 / Leon</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body {
    /* 黑色水滴纹理背景（已使用你上传的图片） */
    background: url('./IMG_6677.jpeg ') center/cover no-repeat fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
/* 主容器 - 毛玻璃效果 */
.container {
    width: 360px;
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.4);
}
/* 顶部背景图（卡通火箭图） */
.header {
    height: 280px;
    background: url('./Lhbf7.jpg') center/cover no-repeat;
}
/* 按钮区 */
.links {
    padding: 20px 20px 30px;
}
/* 按钮 */
.link {
    display: block;
    background: rgba(255, 255, 255, 0.88);
    margin-bottom: 14px;
    padding: 16px;
    border-radius: 14px;
    text-decoration: none;
    color: #1f2937;
    text-align: center;
    font-size: 16px;
    transition: all 0.3s ease;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}
.link:hover {
    background: rgba(255, 255, 255, 0.98);
    transform: translateY(-3px);
}
/* 弹窗 */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}
.modal img {
    width: 280px;
    border-radius: 16px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
}
</style>
</head>
<body>
<div class="container">
    <div class="header"></div>
    
    <div class="links">
        <!-- X -->
        <a class="link" href="https://x.com/sanyeer3" target="_blank">
            𝕏 - 雷昂 / Leon
        </a>
        <!-- 邮箱 -->
        <a class="link" href="mailto:sanyeer3@gmail.com">
            邮箱
        </a>
        <!-- 电报 -->
        <a class="link" href="https://t.me/sanyeer3" target="_blank">
            电报
        </a>
        <!-- 币安USDC（弹出二维码） -->
        <div class="link" onclick="openModal()">
            币安 / USDC
        </div>
    </div>
</div>

<!-- 弹窗 - 二维码 -->
<div class="modal" id="modal" onclick="if(event.target.id === 'modal') closeModal();">
    <img src="./IMG_7833.JPG" onclick="event.stopImmediatePropagation()">
</div>

<script>
function openModal() {
    document.getElementById("modal").style.display = "flex";
}
function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>
</body>
</html>
