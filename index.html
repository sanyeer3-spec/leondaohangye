<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雷昂 / Leon</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body {
    background: linear-gradient(180deg, #e8e6df, #cfc8bb);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
/* 主容器 */
.container {
    width: 360px;
    background: #f3efe6;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
/* 顶部背景图（已替换为你上传的 IMG_7833.JPG） */
.header {
    height: 240px;
    background: url('./IMG_7833.JPG') center/cover no-repeat;
}
/* 头像（你目前还没有上传头像文件，建议再传一张正方形头像并改名为 avatar.jpg） */
.avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid #f3efe6;
    margin: -50px auto 10px;
    background: url('./avatar.jpg') center/cover; /* ← 如果你已有头像文件，请把 avatar.jpg 改成实际文件名 */
}
/* 名字 */
.name {
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    color: #333;
}
/* 副标题 */
.desc {
    text-align: center;
    color: #777;
    margin-top: 6px;
    margin-bottom: 20px;
}
/* 按钮区 */
.links {
    padding: 0 20px 30px;
}
/* 按钮 */
.link {
    display: block;
    background: #e9e4d8;
    margin-bottom: 16px;
    padding: 16px;
    border-radius: 14px;
    text-decoration: none;
    color: #333;
    text-align: center;
    font-size: 16px;
    transition: 0.2s;
    cursor: pointer;
}
.link:hover {
    background: #ddd6c8;
    transform: translateY(-2px);
}
/* 弹窗 */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}
.modal img {
    width: 280px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
</style>
</head>
<body>
<div class="container">
    <div class="header"></div>
    <div class="avatar"></div>
    <div class="name">雷昂 / Leon</div>
    <div class="desc">喜欢分析 | 喜欢分享</div>
    <div class="links">
        <!-- X -->
        <a class="link" href="https://x.com/sanyeer3" target="_blank">
            𝕏 - 雷昂 / Leon
        </a>
        <!-- 邮箱 -->
        <a class="link" href="mailto:sanyeer3@gmail.com">
            邮箱
        </a>
        <!-- 电报 -->
        <a class="link" href="https://t.me/sanyeer3" target="_blank">
            电报
        </a>
        <!-- 币安USDC（弹出图片） -->
        <div class="link" onclick="openModal()">
            币安 / USDC
        </div>
    </div>
</div>

<!-- 弹窗 - 已替换为你的 Lhbf7.jpg -->
<div class="modal" id="modal" onclick="if(event.target.id === 'modal') closeModal();">
    <img src="./Lhbf7.jpg" onclick="event.stopImmediatePropagation()">
</div>

<script>
function openModal() {
    document.getElementById("modal").style.display = "flex";
}
function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>
</body>
</html>
